name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: nschloe/action-cached-lfs-checkout@v1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: "clippy,rustfmt"

      - name: Unpack player_names.json
        run: cd rust/pack-games/python-player-name-aliases/ && gunzip player_names.json.gz

      - name: Run clippy
        run: |
          touch rust/wasm-search/src/games.pack
          cargo clippy --version
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Build wasm
        run: pnpm wasm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter frontend tsc --noEmit

      - name: Lint
        run: pnpm --filter frontend lint --max-warnings 0

      - name: Check formatting
        run: pnpm fmt:check
